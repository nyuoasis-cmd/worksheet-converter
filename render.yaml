services:
  - type: web
    name: worksheet-converter
    runtime: python
    region: singapore
    plan: free
    buildCommand: apt-get install -y fonts-noto-cjk && pip install -r backend/requirements.txt
    startCommand: gunicorn "backend.app:create_app()" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /api/health
